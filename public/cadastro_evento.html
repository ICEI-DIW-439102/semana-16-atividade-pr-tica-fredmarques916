<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Eventos</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Gerenciamento de Eventos (CRUD)</h2>
            <a href="index.html" class="btn btn-secondary">Voltar ao Início</a>
        </div>
        
        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <form id="eventoForm">
                    <input type="hidden" id="eventoId">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="title" class="form-label">Título do Evento</label>
                            <input type="text" class="form-control" id="title" required>
                        </div>
                        <div class="col-md-3 mb-3">
                            <label for="start" class="form-label">Data de Início</label>
                            <input type="date" class="form-control" id="start" required>
                        </div>
                        <div class="col-md-3 mb-3">
                            <label for="end" class="form-label">Data de Fim</label>
                            <input type="date" class="form-control" id="end" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="type" class="form-label">Tipo de Evento</label>
                            <select class="form-select" id="type" required>
                                <option value="workshop">Workshop</option>
                                <option value="conferencia">Conferência</option>
                                <option value="meetup">Meetup</option>
                                <option value="show">Show</option>
                                <option value="outro">Outro</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="location" class="form-label">Localização</label>
                            <input type="text" class="form-control" id="location" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">Salvar Evento</button>
                    <button type="button" class="btn btn-light" id="btnCancel" style="display:none;">Cancelar</button>
                </form>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-body">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>Título</th>
                            <th>Início</th>
                            <th>Fim</th>
                            <th>Tipo</th>
                            <th>Local</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaEventos">
                        <!-- Dados carregados via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
